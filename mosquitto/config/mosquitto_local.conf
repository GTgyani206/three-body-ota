# Eclipse Mosquitto Configuration
# Three-Body OTA — Local Windows Development

# Listeners
listener 1883 0.0.0.0
allow_anonymous true

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Persistence
persistence true
persistence_location C:\Users\gyane\Desktop\Projects\three-body-ota\mosquitto\data\

# Message size — accommodate 4KB firmware chunks + overhead
max_qos 1
max_packet_size 10240
