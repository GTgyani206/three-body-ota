# Eclipse Mosquitto Configuration
# Three-Body OTA — Local Development

# =============================================================================
# Listener
# =============================================================================
listener 1883 0.0.0.0

# =============================================================================
# Security — Anonymous access for local development
# =============================================================================
allow_anonymous true

# =============================================================================
# Logging
# =============================================================================
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# =============================================================================
# Persistence
# =============================================================================
persistence true
persistence_location /mosquitto/data/

# =============================================================================
# Message size — accommodate 4KB firmware chunks + overhead
# =============================================================================
message_size_limit 10240
