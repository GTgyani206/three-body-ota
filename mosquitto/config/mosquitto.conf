# Eclipse Mosquitto Configuration
# Three-Body OTA — Local Development (ACL + QoS1)

# =============================================================================
# Listeners
# =============================================================================

# Plain MQTT listener (local/dev compatibility)
listener 1883 0.0.0.0
allow_anonymous true
acl_file /mosquitto/config/aclfile

# TLS listener intentionally disabled for local dev.
# Enable 8883 in production with valid cert/key material.

# =============================================================================
# Logging
# =============================================================================
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# =============================================================================
# Persistence + reliability
# =============================================================================
persistence true
persistence_location /mosquitto/data/

# Enforce QoS 1 max for predictable OTA message delivery behavior
max_qos 1

# Message size — accommodate 4KB firmware chunks + overhead
max_packet_size 10240
